 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <header>
    <nav class="navbar">
       
        <div class="logo">
             <a href="/" class="back-home">
            <i class="fa-solid fa-arrow-left"></i>
            
        </a>
            <h2>
                <i class="fa-solid fa-building-columns"></i>
                Credit Card <span>Approval Prediction</span>
            </h2>
        </div>

       

    </nav>
</header>


</div>
 <section class="prediction" id="prediction">
        <div class="form-container">

            <form action="/predict" method="POST">

    <div class="input-box">
    <label>Full Name</label>
    <input type="text" name="fullname" placeholder="Enter Full Name" required>
</div>

<div class="input-box">
    <label>Gender</label>
    <select name="gender" required>
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select>
</div>

<div class="input-box">
    <label>Own Car</label>
    <select name="car" required>
        <option value="">Select</option>
        <option value="Y">Yes</option>
        <option value="N">No</option>
    </select>
</div>

<div class="input-box">
    <label>Own Property</label>
    <select name="property" required>
        <option value="">Select</option>
        <option value="Y">Yes</option>
        <option value="N">No</option>
    </select>
</div>

<div class="input-box">
    <label>Number of Children</label>
    <input type="number" name="children" min="0" required>
</div>

<div class="input-box">
    <label>Annual Income</label>
    <input type="number" name="income" placeholder="Enter Annual Income" required>
</div>

<div class="input-box">
    <label>Income Type</label>

    <select name="income_type" required>

        <option value="">Select Income Type</option>

        <option value="Salary">Salary</option>
        <option value="Government Salary">Government Salary</option>
        <option value="Business Income">Business Income</option>
        <option value="Self Employed">Self Employed</option>
        <option value="Pension">Pension</option>
        <option value="Rental Income">Rental Income</option>
        <option value="Agriculture Income">Agriculture Income</option>
        <option value="Other">Other</option>

    </select>
    </div>

    <div class="input-box">
    <label>Credit Score</label>
    <input type="number" name="credit_score" placeholder="Enter Credit Score (300-900)" min="300" max="900" required>
</div>

<div class="input-box">
    <label>Active Loans</label>
    <input type="number" name="active_loans" placeholder="Enter Number of Active Loans" min="0" required>
</div>

<div class="input-box">
    <label>Monthly EMI</label>
    <input type="number" name="monthly_emi" placeholder="Enter Monthly EMI" min="0" required>
</div>

<div class="input-box">
    <label>Credit Card Count</label>
    <input type="number" name="credit_card_count" placeholder="Number of Credit Cards" min="0" required>
</div>

<div class="input-box">
    <label>Missed Payments</label>
    <input type="number" name="missed_payments" placeholder="Enter Missed Payments Count" min="0" required>
</div>

<div class="input-box">
    <label>Default History</label>
    <select name="default_history" required>
        <option value="">Select</option>
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select>
</div>

<div class="input-box">
    <label>Work Phone Available</label>
    <select name="work_phone" required>
        <option value="">Select</option>
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>
</div>

<div class="input-box">
    <label>Monthly Income</label>
    <input type="number" name="monthly_income" required>
</div>

<div class="input-box">
    <label>Marital Status</label>

    <select name="marital_status" required>
        <option value="">Select</option>
        <option>Single</option>
        <option>Married</option>
        <option>Divorced</option>
        <option>Widowed</option>
    </select>
</div>

<div class="input-box">
    <label>Citizenship</label>

    <select name="citizenship" required>
        <option value="">Select</option>
        <option>Indian</option>
        <option>Other</option>
    </select>
</div>

<div class="input-box">
    <label>Education Type</label>
    <select name="education" required>
        <option value="">Select</option>
        <option value="Secondary">Secondary</option>
        <option value="Higher Education">Higher Education</option>
        <option value="Incomplete Higher">Incomplete Higher</option>
        <option value="Academic Degree">Academic Degree</option>
    </select>
</div>

<div class="input-box">
    <label>Family Status</label>
    <select name="family_status" required>
        <option value="">Select</option>
        <option value="Single">Single</option>
        <option value="Married">Married</option>
        <option value="Civil Marriage">Civil Marriage</option>
        <option value="Separated">Separated</option>
        <option value="Widow">Widow</option>
    </select>
</div>

<div class="input-box">
    <label>Housing Type</label>
    <select name="housing" required>
        <option value="">Select</option>
        <option value="House / Apartment">House / Apartment</option>
        <option value="With Parents">With Parents</option>
        <option value="Municipal Apartment">Municipal Apartment</option>
        <option value="Rented Apartment">Rented Apartment</option>
        <option value="Office Apartment">Office Apartment</option>
    </select>
</div>

<div class="input-box">
    <label>Employment Days</label>
    <input type="number" name="employment" placeholder="Enter Employment Days" required>
</div>
<div class="input-box">
    <label>Date of Birth</label>
    <input type="date" name="dob" required>
</div>

<div class="input-box">
    <label>Mobile Number</label>
    <input type="tel" name="mobile" placeholder="Enter Mobile Number" required>
</div>

<div class="input-box">
    <label>Email Address</label>
    <input type="email" name="email" placeholder="Enter Email Address" required>
</div>

<div class="input-box">
    <label>Nationality</label>
    <select name="nationality" required>
        <option value="">Select Nationality</option>
        <option value="Indian">Indian</option>
        <option value="Other">Other</option>
    </select>
</div>

<div class="input-box">
    <label>PAN Number</label>
    <input type="text" name="pan" placeholder="ABCDE1234F" required>
</div>

<div class="input-box">
    <label>Aadhaar Number</label>
    <input type="text" name="aadhaar" placeholder="Enter Aadhaar Number" maxlength="12" required>
</div>

<div class="input-box">
    <label>Residential Address</label>
    <textarea name="address" rows="3" placeholder="Enter Address" required></textarea>
</div>

<div class="input-box">
    <label>City</label>
    <input type="text" name="city" required>
</div>

<div class="input-box">
    <label>State</label>
    <input type="text" name="state" required>
</div>

<div class="input-box">
    <label>Pincode</label>
    <input type="number" name="pincode" required>
</div>

<div class="input-box">
    <label>Occupation</label>

    <select name="occupation" required>

        <option value="">Select Occupation</option>

        <option value="Laborers">Laborers</option>
        <option value="Core staff">Core Staff</option>
        <option value="Managers">Managers</option>
        <option value="Sales staff">Sales Staff</option>
        <option value="Drivers">Drivers</option>
        <option value="High skill tech staff">High Skill Tech Staff</option>
        <option value="Medicine staff">Medicine Staff</option>
        <option value="Accountants">Accountants</option>
        <option value="Cooking staff">Cooking Staff</option>
        <option value="Security staff">Security Staff</option>
        <option value="Cleaning staff">Cleaning Staff</option>
        <option value="Private service staff">Private Service Staff</option>
        <option value="Low-skill Laborers">Low Skill Laborers</option>
        <option value="Secretaries">Secretaries</option>
        <option value="Waiters/barmen staff">Waiters / Barmen Staff</option>
        <option value="Realty agents">Realty Agents</option>
        <option value="HR staff">HR Staff</option>
        <option value="IT staff">IT Staff</option>

    </select>
</div>

<div class="input-box">
    <label>Family Members Count</label>
    <input type="number" name="family_members" min="1" required>
</div>

<button type="submit" class="predict-btn">
    Predict Approval
</button>

</form>

{% if prediction %}
<div class="result">
    <h2>{{ prediction }}</h2>
</div>
{% endif %}

        </div>

    </section>
      <footer>

        <div class="footer-content">

            <hr>

<h3>Contact Us</h3>
<p> Credit Card Approval Prediction</p>

<p>
    <i class="fa-solid fa-envelope"></i>
    support@creditcardapproval.com
</p>

<p>
    <i class="fa-solid fa-phone"></i>
     +91 98765 43210
</p>

        </div>

    </footer>

</body>
</html>
